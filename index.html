<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PGM VII.1-148 荷马神谕占卜</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-labelledby="title">
    <section class="panel">
      <p class="kicker">PGM VII.1-148</p>
      <h1 id="title">荷马神谕占卜</h1>

      <div class="dice-row" aria-label="三次随机数">
        <output class="die" id="die-a">?</output>
        <output class="die" id="die-b">?</output>
        <output class="die" id="die-c">?</output>
      </div>

      <button id="draw-button" type="button">掷骰取谶</button>

      <section class="result" aria-live="polite">
        <div class="meta">
          <span>掷数 <strong id="roll-text">--</strong></span>
          <span>查表 <strong id="key-text">--</strong></span>
        </div>
        <blockquote id="oracle-text">静心之后点击按钮，生成三次 1-6 的随机数。</blockquote>
      </section>

      <p class="note">按三次掷数的顺序查表，例如 “4、2、4” 查 “4-2-4”。原始条目缺少 5-1-1。</p>
    </section>
  </main>

  <script src="oracles.js"></script>
  <script src="app.js"></script>
</body>
</html>
